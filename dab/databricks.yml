# This is a Databricks asset bundle definition for dab.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab
  uuid: 420d692e-87f8-4f1a-a265-ae84bfad0b1a

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405606742544701.1.azuredatabricks.net
    variables:
      catalog: hive_metastore
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405606742544701.1.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/abhijit.rajale@ctpsandbox.com to make sure we only have a single copy.
      root_path: /Workspace/Users/abhijit.rajale@ctpsandbox.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: prod
    permissions:
      - user_name: abhijit.rajale@ctpsandbox.com
        level: CAN_MANAGE
